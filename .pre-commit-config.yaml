# Pre-commit hooks configuration
# https://pre-commit.com
#
# Install:  pre-commit install
# Run all:  pre-commit run --all-files
# Update:   pre-commit autoupdate
# Run:      pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  # General hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace # Remove trailing whitespace
        args: ['--markdown-linebreak-ext=md']
      - id: end-of-file-fixer # Ensure files end with newline
      - id: check-yaml # Validate YAML syntax
      - id: check-json # Validate JSON syntax
      - id: check-xml # Validate XML syntax
      - id: check-added-large-files # Prevent giant files from being committed
        args: ['--maxkb=500']
      - id: check-merge-conflict # Detect merge conflict markers
      - id: mixed-line-ending # Detect mixed line endings
        args: ['--fix=lf'] # Normalize to LF line endings
      - id: check-case-conflict # Detect files that would conflict on case-insensitive filesystems
      #- id: detect-private-key # Prevent committing private keys (....i not sure if this is useful in this state of the project, but it can be enabled later if needed)

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: ['--fix']
        files: \.(md|markdown)$

  # Python - Ruff (linting + formatting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff
        args: ['--fix']
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Type checking (optional - remove if not using type hints)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports', '--no-error-summary']
        files: ^backend/
        exclude: ^backend/.*/migrations/

  # Frontend React (ESLint)
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (Frontend)
        entry: npm run lint --prefix frontend
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false

  # Django migrations check
  - repo: local
    hooks:
      - id: migrations-check
        name: Check for uncreated migrations
        entry: python backend/manage.py makemigrations --check --dry-run
        language: system
        files: ^backend/.*models\.py$
        pass_filenames: false
