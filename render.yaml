services:
  - type: web
    name: fullstack-todolist-backend
    env: python
    rootDir: backend
    buildCommand: ./scripts/build_backend.sh
    startCommand: gunicorn todolistapi.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: fullstack-todolist-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
