name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Check and Migrate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install hatchling and dependencies
        run: |
          python -m pip install --upgrade pip hatchling
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check backend/

      - name: Django system check
        working-directory: backend
        env:
          DATABASE_URL: ""
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: python manage.py check

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: ""
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: python manage.py migrate --noinput
